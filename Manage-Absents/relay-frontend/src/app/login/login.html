<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-sky-900 px-4 py-8">
  <div class="w-full max-w-md rounded-3xl bg-slate-950/95 border border-slate-700 p-10 shadow-2xl shadow-slate-950/40 backdrop-blur-lg">
    <h2 class="text-3xl font-semibold text-slate-100 text-center mb-8">Connexion</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-2">
        <label for="email" class="block text-sm font-medium text-slate-300">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          required
          class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 outline-none transition duration-200 focus:border-sky-400 focus:ring-2 focus:ring-sky-500/20"
        />
      </div>

      <div class="space-y-2">
        <label for="password" class="block text-sm font-medium text-slate-300">Mot de passe</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          required
          class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 outline-none transition duration-200 focus:border-sky-400 focus:ring-2 focus:ring-sky-500/20"
        />
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full rounded-2xl bg-sky-500 px-4 py-3 text-base font-semibold text-slate-950 transition hover:bg-sky-400 disabled:cursor-not-allowed disabled:bg-slate-600"
      >
        Se connecter
      </button>
    </form>

    <p *ngIf="errorMessage" class="mt-4 text-sm text-red-400">{{ errorMessage }}</p>

    <p class="mt-6 text-center text-sm text-slate-400">
      Pas de compte ?
      <a routerLink="/register" class="font-semibold text-sky-400 hover:text-sky-300">Inscrivez-vous</a>
    </p>
  </div>
</div>
