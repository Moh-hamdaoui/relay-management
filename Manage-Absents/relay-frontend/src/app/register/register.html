<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-cyan-950 px-4 py-8">
  <div class="w-full max-w-md rounded-[32px] bg-slate-950/95 border border-slate-700 p-10 shadow-2xl shadow-slate-950/40 backdrop-blur-lg">
    <h2 class="text-3xl font-semibold text-slate-100 text-center mb-8">Créer un compte</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-2">
        <label for="firstname" class="block text-sm font-medium text-slate-300">Prénom</label>
        <input
          type="text"
          id="firstname"
          formControlName="firstname"
          required
          class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 outline-none transition duration-200 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20"
        />
      </div>

      <div class="space-y-2">
        <label for="surname" class="block text-sm font-medium text-slate-300">Nom</label>
        <input
          type="text"
          id="surname"
          formControlName="surname"
          required
          class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 outline-none transition duration-200 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20"
        />
      </div>

      <div class="space-y-2">
        <label for="email" class="block text-sm font-medium text-slate-300">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          required
          class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 outline-none transition duration-200 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20"
        />
      </div>

      <div class="space-y-2">
        <label for="password" class="block text-sm font-medium text-slate-300">Mot de passe</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          required
          class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 outline-none transition duration-200 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20"
        />
      </div>

      <button
        type="submit"
        [disabled]="registerForm.invalid"
        class="w-full rounded-2xl bg-cyan-500 px-4 py-3 text-base font-semibold text-slate-950 transition hover:bg-cyan-400 disabled:cursor-not-allowed disabled:bg-slate-600"
      >
        S'inscrire
      </button>
    </form>

    <p *ngIf="errorMessage" class="mt-4 text-sm text-red-400">{{ errorMessage }}</p>
    <p *ngIf="successMessage" class="mt-4 text-sm text-emerald-400">{{ successMessage }}</p>

    <p class="mt-6 text-center text-sm text-slate-400">
      Déjà inscrit ?
      <a routerLink="/login" class="font-semibold text-cyan-400 hover:text-cyan-300">Connectez-vous</a>
    </p>
  </div>
</div>
